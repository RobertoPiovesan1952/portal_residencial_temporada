{% extends "base/admin.html" %}
{% block content %}
<h1>Candidatos</h1>
<table class="table table-hover bg-white mt-4">
  <tr><th>Nome</th><th>Telefone</th><th>Empresa</th><th>Status</th><th></th></tr>
  {% for c in candidatos %}
  <tr>
    <td>{{ c.nome }}</td><td>{{ c.telefone }}</td><td>{{ c.empresa }}</td><td>{{ c.get_status_display }}</td>
    <td><a class="btn btn-sm btn-primary" href="{% url 'candidato_detalhe' c.pk %}">Abrir</a></td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
