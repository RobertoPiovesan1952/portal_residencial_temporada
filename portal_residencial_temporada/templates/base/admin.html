<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal Residencial Temporada</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/portal/">Portal Residencial Temporada</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/portal/">Dashboard</a>
      <a class="nav-link" href="/portal/candidatos/">Candidatos</a>
      <a class="nav-link" href="/portal/moradores/">Moradores</a>
      <a class="nav-link" href="/admin/">Admin Django</a>
      <a class="nav-link" href="/portal/logout/">Sair</a>
    </div>
  </div>
</nav>
<main class="container-fluid py-4">
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
