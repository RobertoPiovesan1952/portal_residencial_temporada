{% extends "base/public.html" %}
{% block content %}
<div class="container py-5">
  <h1>Solicitar vaga</h1>
  <p>Preencha sua ficha. A administração analisará os dados e entrará em contato.</p>
  <form method="post" enctype="multipart/form-data" class="card p-4 mt-4">
    {% csrf_token %}
    <div class="row g-3">
      {% for field in form %}
        <div class="col-md-6">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
        </div>
      {% endfor %}
    </div>
    <button class="btn btn-primary mt-4">Enviar solicitação</button>
  </form>
</div>
{% endblock %}
