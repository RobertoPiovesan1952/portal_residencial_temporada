<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Residencial Temporada</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">Residencial Temporada</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="/estrutura/">Estrutura</a>
      <a class="nav-link" href="/regras/">Regras</a>
      <a class="btn btn-warning ms-lg-3" href="/solicitar-vaga/">Solicitar vaga</a>
    </div>
  </div>
</nav>
{% if messages %}
  <div class="container mt-3">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
{% endif %}
{% block content %}{% endblock %}
<footer class="py-4 bg-dark text-white mt-5">
  <div class="container small">© Residencial Temporada — Moradia compartilhada masculina.</div>
</footer>
</body>
</html>
