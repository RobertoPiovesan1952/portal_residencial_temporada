{% extends "base/admin.html" %}
{% block content %}
<h1>Aprovar candidato</h1>
<p>Confirmar aprovação de <b>{{ candidato.nome }}</b>?</p>
<form method="post">
  {% csrf_token %}
  <button class="btn btn-success">Confirmar</button>
  <a class="btn btn-secondary" href="{% url 'candidato_detalhe' candidato.pk %}">Cancelar</a>
</form>
{% endblock %}
